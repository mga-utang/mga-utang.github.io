    <script>
      // Single Page Apps for GitHub Pages

      (function(l) {
        if (l.search[1] === '/') {
          var s = l.search.slice(1).split('&').map(function(c) {
            var p = c.split('=');
            return p[0] + '=' + decodeURIComponent(p[1].replace(/\+/g, ' '));
          }).join('&');
          l.replace(l.pathname.slice(0, -1) + l.hash + (s ? '?' + s : ''));
        }
      })(window.location);
    </script>
